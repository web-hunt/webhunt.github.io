<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login • WebHunt</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/auth.css">

</head>

<body>

<div class="auth-container">

<div class="auth-card">

<h1 id="formTitle">

Welcome Back

</h1>

<p id="formSubtitle">

Log in to continue discovering amazing websites.

</p>

<form id="authForm">

<input
type="text"
id="username"
placeholder="Username"
style="display:none;">

<input
type="email"
id="email"
placeholder="Email"
required>

<input
type="password"
id="password"
placeholder="Password"
required>

<input
type="password"
id="confirmPassword"
placeholder="Confirm Password"
style="display:none;">

<button
type="submit"
id="submitButton">

Log In

</button>

</form>

<button
id="googleButton"
class="google-btn">

Continue with Google

</button>

<p id="toggleText">

Don't have an account?

<a href="#" id="toggleMode">

Create one

</a>

</p>

</div>

</div>

<script type="module" src="js/firebase.js"></script>
<script type="module" src="js/auth.js"></script>

</body>

</html>
